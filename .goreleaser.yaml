version: 2

project_name: mgit

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: mgit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch

# ── Homebrew Cask ────────────────────────────────────────────────────────────
# Requires: HOMEBREW_TAP_GITHUB_TOKEN secret with write access to homebrew-tap repo
homebrew_casks:
  - name: mgit
    homepage: https://github.com/protibimbok/mgit
    description: Manage multiple GitHub SSH profiles from one machine
    license: MIT
    binaries:
      - mgit
    repository:
      owner: protibimbok
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mgit"]
          end

# ── AUR (Arch Linux) ─────────────────────────────────────────────────────────
# Requires: AUR_KEY secret (SSH private key registered on aur.archlinux.org)
aurs:
  - name: mgit-bin
    homepage: https://github.com/protibimbok/mgit
    description: Manage multiple GitHub SSH profiles from one machine
    maintainers:
      - "Saad Khan <sakib.saad.khan@gmail.com>"
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/mgit-bin.git"
    depends:
      - git
      - openssh
    provides:
      - mgit
    conflicts:
      - mgit

# ── Linux packages (.deb / .rpm / .apk) ──────────────────────────────────────
nfpms:
  - id: packages
    package_name: mgit
    homepage: https://github.com/protibimbok/mgit
    description: Manage multiple GitHub SSH profiles from one machine
    maintainer: Saad Khan <sakib.saad.khan@gmail.com>
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    dependencies:
      - git
    recommends:
      - openssh-client
